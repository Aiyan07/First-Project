<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Book Seat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .signup-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            padding: 20px;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(163, 137, 212, 0.2);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .signup-card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #a389d4;
            margin-bottom: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1e1b29;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: #a389d4;
        }

        .signup-submit {
            width: 100%;
            padding: 15px;
            background: #a389d4;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #b5b5b5;
        }

        .login-link a {
            color: #a389d4;
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #b5b5b5; /* Dimmed color */
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: white; /* Brightens on hover */
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <span class="icon">🎟️</span> BOOK SEAT
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
            </ul>
        </nav>
    </header>

    <div class="signup-wrapper">
        <div class="signup-card">
            <h2>Create <span class="accent-text">Account</span></h2>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPass" placeholder="Create a password" required>
                </div>

                <button type="submit" class="signup-submit">Register Now</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPass').value;

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Account created successfully! You can now login.");
                    window.location.href = "login.html";
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                alert("Server error. Make sure your backend is running!");
            }
        });
    </script>
</body>
</html>
